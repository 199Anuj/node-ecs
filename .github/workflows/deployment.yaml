name: Node JS Project CI/CD

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    AWS_REGION: us-east-1
    ECR_REPOSITORY: node/nodejs-es
    ECS_CLUSTER: nodejs-ecs-cluster
    ECS_SERVICE: nodejs-ecs-task-defination-service
    ECS_CONTAINER_NAME: nodejs-ecs-container
    ECS_TASK_DEFINITION: nodejs-ecs-task-defination
        
jobs:
    codeql-analysis:
        name: CodeQL Analysis
        runs-on: ubuntu-latest
        permissions:
          security-events: write
          contents: read
    
        steps:
          - uses: actions/checkout@v4

          - name: initlization code-ql
            run: echo "CodeQL Analysis for Node JS Project"
    
          - name: Initialize CodeQL
            uses: github/codeql-action/init@v3
            with:
              languages: javascript
    
          - name: Autobuild
            uses: github/codeql-action/autobuild@v3
    
          - name: Perform CodeQL Analysis
            uses: github/codeql-action/analyze@v3

    build-and-linting:
        name: Build and Linting
        runs-on: ubuntu-latest

        steps:
            - name : Initialize Build and Linting
              run: echo "Build and Linting for Node JS Project"

            - name : Checkout code
              uses: actions/checkout@v4

            - name : Setup Node JS
              uses: actions/setup-node@v3
              with:
                node-version: '20'

            - name : Install dependencies
              run: npm install

            - name : Run Linting
              run: npm run lint 

    deploy:
        name: Deploy to AWS
        runs-on: ubuntu-latest
        needs: [codeql-analysis, build-and-linting]
        permissions:
           id-token: write   # REQUIRED for OIDC
           contents: read
        steps:
            - name : Initialize Deployment
              run : echo "Deploying Node JS Project to AWS"

            - name : Checkout code
              uses: actions/checkout@v4

            - name : Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::654654306281:role/ECS-deployment-role
                aws-region: ${{ env.AWS_REGION}}

            - name : Generate Image Tag
              id : image-tag
              run : echo "tag=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            - name: Login to Amazon ECR
              run: |
                    ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                    ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
                    
                    aws ecr get-login-password --region $AWS_REGION \
                      | docker login --username AWS --password-stdin $ECR_REGISTRY
                    
                    echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV
          
            - name: Build and Push Docker Image
              run: |
                IMAGE_TAG=${{ steps.image-tag.outputs.tag }}
                
                docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
                docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            - name: Download current task definition
              run: |
                aws ecs describe-task-definition \
                  --task-definition $ECS_TASK_DEFINITION \
                  --query taskDefinition > task-definition.json

            - name: Update task definition with new image
              run: |
                IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.image-tag.outputs.tag }}
            
                jq --arg IMAGE "$IMAGE_URI" \
                  '.containerDefinitions[0].image = $IMAGE
                  | del(.taskDefinitionArn)
                  | del(.revision)
                  | del(.status)
                  | del(.requiresAttributes)
                  | del(.compatibilities)
                  | del(.registeredAt)
                  | del(.registeredBy)' \
                  task-definition.json > new-task-def.json


            - name: Register new task definition
              run: |
                aws ecs register-task-definition \
                  --cli-input-json file://new-task-def.json


            - name: Update ECS service
              run: |
                aws ecs update-service \
                  --cluster $ECS_CLUSTER \
                  --service $ECS_SERVICE \
                  --task-definition $ECS_TASK_DEFINITION \
                  --force-new-deployment
            

            - name: Wait for service stability
              run: |
                aws ecs wait services-stable \
                  --cluster $ECS_CLUSTER \
                  --services $ECS_SERVICE
